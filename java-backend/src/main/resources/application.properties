# Application name
spring.application.name=voltgrid-billing

# Server port
server.port=8080

# Database — reads from DATABASE_URL env var
# Format: jdbc:postgresql://host:port/dbname?user=...&password=...
# Set via environment variable DATABASE_URL or override here for local dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/voltgrid}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Logging
logging.level.com.voltgrid=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# JSON formatting
spring.jackson.serialization.indent-output=true
